version: '3.8'

services:
  # AI 漫剧工作台 - 前端服务
  web:
    image: paopaoyuy/ai-comic-web:latest
    container_name: ai-comic-web
    restart: unless-stopped
    ports:
      - "3005:80"
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
